<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Proyecto SASS Nesting</title>

<link rel="stylesheet" href="css/styles.css">

</head>


<body>


<header>

<h1>Proyecto SASS - Nesting y Validación</h1>

</header>



<main>


<section class="cards">


<article class="card card--highlighted">


<h2 class="card__title">
Componente Card
</h2>


<p class="card__content">
Ejemplo utilizando variables, nesting y metodología BEM.
</p>


<button class="card__button">
Ver más
</button>


</article>


</section>




<section>


<h2>Formulario de contacto</h2>



<form class="form">


<div class="form__group">


<label class="form__label" for="nombre">
Nombre
</label>


<input 
class="form__input"
type="text"
id="nombre"
name="nombre"
required
>


</div>




<div class="form__group">


<label class="form__label" for="email">
Email
</label>


<input
class="form__input"
type="email"
id="email"
name="email"
required
>


</div>



<div class="form__group">


<label class="form__label" for="mensaje">
Mensaje
</label>


<textarea
class="form__input"
id="mensaje"
name="mensaje"
required>
</textarea>


</div>



<button class="form__button" type="submit">

Enviar

</button>


</form>


</section>



</main>



</body>

</html>
